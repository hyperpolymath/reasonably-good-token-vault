#
# Dependabot Configuration - MAXIMUM ALERTS
#
# Notify on EVERYTHING: critical, high, medium, low, notes
# Daily checks, immediate alerts

version: 2
updates:
  # Rust dependencies — vault-broker
  - package-ecosystem: "cargo"
    directory: "/vault-broker"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels: ["dependencies", "security", "rust"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      rust-all: { patterns: ["*"] }

  # Rust dependencies — vault-worker
  - package-ecosystem: "cargo"
    directory: "/vault-worker"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels: ["dependencies", "security", "rust", "wasm"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # Rust dependencies — rgtv-cli
  - package-ecosystem: "cargo"
    directory: "/rgtv-cli"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels: ["dependencies", "security", "rust"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # GitHub Actions - critical for CI security
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
      - "security"
    commit-message:
      prefix: "ci(deps)"

  # Nix flake inputs
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "nix"
    commit-message:
      prefix: "chore(nix)"

# Note: npm/pip/mix removed - we use Deno/Rust/Gleam per CLAUDE.md policy

# Registry configuration (if private packages)
registries: {}