#
# Minimal Rust CI for the three RGTV crates.
# Replaces the ATS-era ci.yml/nightly.yml/release.yml deleted on 2026-04-17.

name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check / Fmt / Clippy / Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [vault-broker, rgtv-cli]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: cargo fmt --check
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --check

      - name: cargo check
        working-directory: ${{ matrix.crate }}
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: ${{ matrix.crate }}
        run: cargo test

  worker-build:
    name: vault-worker WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          workspaces: vault-worker

      - name: Install worker-build
        run: cargo install worker-build --locked

      - name: Build WASM
        working-directory: vault-worker
        run: worker-build --release
