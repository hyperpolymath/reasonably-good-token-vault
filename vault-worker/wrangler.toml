# wrangler.toml — Cloudflare Workers deployment for vault-worker (production)
#
# This is the production deployment target for RGTV.  Fly.io (vault-broker) is
# for internal flycast spot-testing only.
#
# Grant state is stored in Durable Objects (not KV) to provide an atomic
# one-use guarantee: each grant is its own DO instance; the Workers runtime
# serialises concurrent fetches to it, so read+delete is atomic.
#
# ── One-time setup ──────────────────────────────────────────────────────────
#
#  1. Create the CREDENTIALS KV namespace:
#       wrangler kv:namespace create CREDENTIALS
#     Paste the returned IDs into the [[kv_namespaces]] block below.
#
#  2. Set the agent token (never in this file):
#       wrangler secret put RGTV_AGENT_TOKEN
#
#  3. Populate credentials in the CREDENTIALS namespace:
#       wrangler kv:key put --namespace-id=<CREDENTIALS_ID> NESY_INGEST_TOKEN <value>
#       wrangler kv:key put --namespace-id=<CREDENTIALS_ID> FLY_API_TOKEN <value>
#       # ... one entry per hint (hint name = KV key)
#
#  4. Deploy (Durable Object migration runs automatically on first deploy):
#       just worker-deploy
#
# ────────────────────────────────────────────────────────────────────────────

name = "rgtv-vault"

# worker-build generates a JS shim that imports the WASM module.
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-15"

# WASM size limit: 10 MiB (free plan) / 25 MiB (paid).
# workers-rs + opt-level="s" + LTO typically compiles to ~1–2 MiB.

# ── KV namespace: CREDENTIALS ────────────────────────────────────────────────
#
# hint → plaintext credential value.
# Private namespace — only this worker can access it.
# TODO: encrypt values with RGTV_MASTER_KEY Worker Secret (AES-256-GCM).
#
[[kv_namespaces]]
binding = "CREDENTIALS"
id = "REPLACE_WITH_CREDENTIALS_NAMESPACE_ID"
preview_id = "REPLACE_WITH_CREDENTIALS_PREVIEW_ID"

# ── Durable Objects: GRANTS ───────────────────────────────────────────────────
#
# One GrantObject instance per outstanding grant, keyed by grant_id UUID.
# DO instances are single-threaded → concurrent redeem requests to the same
# grant are serialised, giving atomic one-use semantics.
#
[durable_objects]
bindings = [
  { name = "GRANTS", class_name = "GrantObject" }
]

# CF requires a migrations block to register new DO classes on first deploy.
# On subsequent deploys with no class changes, this block is a no-op.
[[migrations]]
tag = "v1"
new_classes = ["GrantObject"]

# ── Environment variables ─────────────────────────────────────────────────
[vars]
RGTV_GRANT_TTL_SECS = "30"
# RGTV_AGENT_TOKEN — set via: wrangler secret put RGTV_AGENT_TOKEN
# (never in this file — Worker Secrets are encrypted at rest)
